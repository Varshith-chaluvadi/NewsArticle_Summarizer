<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fast Fresh Facts — AI-powered news article summarizer. Paste any URL and get an instant summary.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>Fast. Fresh. Facts.</title>
</head>
<body>

    <div class="bg-noise"></div>

    <div class="container">
        <header class="hero">
            <div class="logo-icon">📰</div>
            <h1>Fast <span class="gradient-text">Fresh</span> Facts</h1>
            <p class="tagline">AI-powered news summaries in seconds</p>
        </header>

        <main class="card">
            <form method="post" id="summarize-form">
                <div class="input-group">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input type="url" name="article_url" id="article-url-input" placeholder="Paste a news article URL..." required>
                </div>
                <button type="submit" id="summarize-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Summarize
                </button>
            </form>

            {% if error %}
            <div class="error-message" id="error-display">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            {% if summary %}
            <div class="result-section" id="summary-section">
                <h2>Summary</h2>
                <div class="summary-box">
                    <p>{{ summary }}</p>
                </div>
            </div>
            {% endif %}

            {% if images %}
            <div class="result-section" id="images-section">
                <h2>Article Images</h2>
                <div class="image-grid">
                    {% for img in images %}
                    <div class="image-card">
                        <img src="{{ img }}" alt="Article image" loading="lazy">
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
        </main>

        <footer>
            <p>Powered by <strong>DistilBART</strong> · Built with Flask</p>
        </footer>
    </div>

</body>
</html>
